services:
  - type: web
    name: arb-researchhub-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.23.1
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 7d
      - key: ALLOWED_EMAIL_DOMAIN
        value: unilag.edu.ng
      - key: STORAGE_DRIVER
        value: supabase
      - key: SUPABASE_BUCKET
        value: papers
      - key: ENABLE_PASSWORD_RESET
        value: "false"
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: EMBEDDING_MODEL
        value: hashing-v1
      - key: EMBEDDING_DIM
        value: "384"
      - key: WARM_EMBEDDINGS_ON_START
        value: "false"
